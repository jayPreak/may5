<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0306" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>HAPY BIRTHDAY ISHU 🩷</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
<style>
/* Cinematic overrides */
html, body { background: #000; }
.scene { position: relative; min-height: 100svh; width: 100%; overflow: hidden; }
.bg-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
}
.scene-tint {
  position: absolute; inset: 0;
  z-index: 1;
  pointer-events: none;
}
.scene-content {
  position: relative;
  z-index: 5;
  width: 100%;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cine-vignette {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background:
    radial-gradient(ellipse 100% 70% at 50% 50%, transparent 35%, rgba(0,0,0,0.65) 100%),
    linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.55) 100%);
}
.pink-tint {
  background:
    linear-gradient(135deg, rgba(255,62,127,0.18), rgba(226,27,98,0.25)),
    radial-gradient(ellipse 60% 80% at 50% 100%, rgba(255,143,182,0.35), transparent 60%);
  mix-blend-mode: soft-light;
}
.warm-tint {
  background:
    linear-gradient(135deg, rgba(255,143,182,0.2), rgba(255,180,120,0.22)),
    radial-gradient(ellipse 70% 60% at 50% 0%, rgba(255,200,150,0.3), transparent 60%);
  mix-blend-mode: overlay;
}
.deep-tint {
  background:
    linear-gradient(180deg, rgba(20,5,12,0.55), rgba(60,15,40,0.4));
}

/* Letterboxing for cinema feel — top bar only, no bottom bar */
.cine-bars::before {
  content: "";
  position: fixed;
  left: 0; right: 0;
  height: 32px;
  background: #000;
  z-index: 50;
  pointer-events: none;
  top: 0;
}

/* Big cinema type */
.cine-word {
  font-family: 'Italiana', serif;
  font-weight: 400;
  font-size: clamp(80px, 18vw, 280px);
  line-height: 0.9;
  letter-spacing: -0.01em;
  color: #fff;
  text-shadow: 0 0 40px rgba(255,143,182,0.3), 0 4px 20px rgba(0,0,0,0.4);
}
.cine-script {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
}
.cine-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
}

/* Scene marker - tiny chapter numerals */
.chapter-mark {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Italiana', serif;
  font-size: clamp(140px, 26vw, 380px);
  line-height: 1;
  color: rgba(255,255,255,0.06);
  z-index: 3;
  pointer-events: none;
  mix-blend-mode: overlay;
}
.chapter-mark.left { left: -3vw; }
.chapter-mark.right { right: -3vw; }

/* Slow zoom on videos */
.ken-burns {
  animation: kenBurns 28s ease-in-out infinite alternate;
  transform-origin: center;
}
@keyframes kenBurns {
  0%   { transform: scale(1.08) translate(0, 0); }
  100% { transform: scale(1.18) translate(-2%, 1%); }
}
.ken-burns-2 {
  animation: kenBurns2 32s ease-in-out infinite alternate;
}
@keyframes kenBurns2 {
  0%   { transform: scale(1.12) translate(2%, -1%); }
  100% { transform: scale(1.22) translate(-1%, 2%); }
}

/* Fade-in word reveal */
.word-reveal {
  opacity: 0;
  transform: translateY(40px) scale(0.96);
  filter: blur(14px);
  transition: opacity 1.6s cubic-bezier(0.2, 0.8, 0.2, 1),
              transform 1.6s cubic-bezier(0.2, 0.8, 0.2, 1),
              filter 1.6s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.word-reveal.in {
  opacity: 1;
  transform: none;
  filter: blur(0);
}

/* Loading state */
#preload {
  position: fixed; inset: 0;
  background: #000;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  transition: opacity 1s ease, visibility 1s;
}
#preload.gone {
  opacity: 0;
  visibility: hidden;
}
#preload .pl-mark {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ff5e94;
  box-shadow: 0 0 20px #ff5e94, 0 0 50px #ff3e7f;
  animation: plPulse 1.4s ease-in-out infinite;
}
#preload .pl-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
@keyframes plPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.4); opacity: 0.4; }
}

/* Audio toggle */
.audio-toggle {
  position: fixed;
  top: max(28px, env(safe-area-inset-top));
  right: 32px;
  z-index: 80;
  display: flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  background: none;
  border: none;
  mix-blend-mode: difference;
}
.audio-toggle .bars {
  display: inline-flex; gap: 2px; align-items: end;
  height: 14px;
}
.audio-toggle .bars span {
  display: block;
  width: 2px;
  background: rgba(255,255,255,0.7);
  animation: barJump 0.8s ease-in-out infinite alternate;
}
.audio-toggle .bars span:nth-child(1) { height: 60%; animation-delay: -0.4s; }
.audio-toggle .bars span:nth-child(2) { height: 100%; animation-delay: -0.2s; }
.audio-toggle .bars span:nth-child(3) { height: 70%; animation-delay: 0s; }
.audio-toggle .bars span:nth-child(4) { height: 90%; animation-delay: -0.3s; }
@keyframes barJump {
  to { transform: scaleY(0.3); }
}
.audio-toggle.muted .bars span { animation-play-state: paused; opacity: 0.3; }

/* Scroll progress bar */
.scroll-bar {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  height: 2px;
  z-index: 90;
  background: rgba(255,255,255,0.06);
}
.scroll-bar-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: linear-gradient(to right, #ff8eb3, #ff3e7f, #fff);
  width: 0%;
  transition: width 0.1s linear;
  box-shadow: 0 0 12px #ff3e7f;
}

/* Mobile tweaks for cinematic */
@media (max-width: 820px) {
  .cine-word { font-size: clamp(64px, 22vw, 140px) !important; }
  .chapter-mark { font-size: clamp(120px, 36vw, 240px); }
  .audio-toggle { right: 16px; font-size: 9px; }
  .audio-toggle span:not(.bars) { display: none; }
  .meta { display: none; }
  .brand { font-size: 10px; letter-spacing: 0.28em; }
}

/* ============ Floating Cards Scene ============ */
.ph-wow {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  background: linear-gradient(135deg, #2a0a18 0%, #4a1530 30%, #2a0a18 60%, #6a1a3e 100%);
  background-size: 300% 300%;
  animation: phShift 8s ease-in-out infinite;
  border: 1px solid rgba(255,182,210,0.2);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.15),
    inset 0 -1px 0 rgba(0,0,0,0.3),
    0 24px 60px rgba(255,62,127,0.18);
}
.ph-wow::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(60% 80% at 30% 30%, rgba(255,143,182,0.4), transparent 65%),
    radial-gradient(40% 60% at 70% 70%, rgba(255,217,228,0.3), transparent 65%);
  mix-blend-mode: screen;
}
.ph-wow::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
  background-size: 200% 100%;
  animation: phSheen 4s ease-in-out infinite;
  mix-blend-mode: overlay;
}
.ph-mark-wow {
  position: absolute; top: 14px; right: 16px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ff5e94;
  box-shadow: 0 0 14px #ff5e94, 0 0 30px #ff3e7f;
  z-index: 3;
}
.ph-num {
  position: absolute; bottom: 14px; left: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.7);
  z-index: 3;
}
@keyframes phShift {
  0%, 100% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
}
@keyframes phSheen {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
.float-orbit {
  position: absolute;
  width: 100%; height: 100%;
  perspective: 1200px;
}
.float-orbit .orbit-frame {
  position: absolute;
  width: 200px; height: 280px;
  left: 50%; top: 50%;
  margin: -140px 0 0 -100px;
  animation: orbitFly 24s ease-in-out infinite;
  transform-style: preserve-3d;
}
@keyframes orbitFly {
  0%, 100% {
    transform: translate3d(var(--x, 0), var(--y, 0), var(--z, 0))
               rotateY(var(--ry, 0deg)) rotateX(var(--rx, 0deg));
  }
  50% {
    transform: translate3d(calc(var(--x, 0) * 0.6), calc(var(--y, 0) - 30px), calc(var(--z, 0) - 50px))
               rotateY(calc(var(--ry, 0deg) + 20deg)) rotateX(calc(var(--rx, 0deg) - 10deg));
  }
}
.orb {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,143,182,0.5) 40%, transparent 80%);
  filter: blur(2px);
  animation: orbFloat 16s ease-in-out infinite;
  pointer-events: none;
  mix-blend-mode: screen;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(40px, -60px) scale(1.3); }
  66% { transform: translate(-30px, 30px) scale(0.8); }
}
@keyframes heartBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}
.ocean-wave {
  position: absolute;
  left: -50%; right: -50%;
  height: 80%;
  top: 30%;
  background-repeat: repeat-x;
  background-size: 1200px 100%;
  mix-blend-mode: screen;
  opacity: 0.7;
  transform-origin: 50% 0%;
  animation: oceanFlow 14s linear infinite;
}
.ocean-wave.w1 {
  background-image:
    radial-gradient(ellipse 600px 80px at 50% 50%, rgba(255,217,228,0.5), transparent 70%),
    radial-gradient(ellipse 400px 60px at 0% 50%, rgba(255,143,182,0.4), transparent 70%);
  top: 38%; height: 30%; animation-duration: 18s; filter: blur(1px);
}
.ocean-wave.w2 {
  background-image:
    radial-gradient(ellipse 800px 100px at 50% 50%, rgba(255,94,148,0.6), transparent 65%),
    radial-gradient(ellipse 500px 70px at 100% 50%, rgba(226,27,98,0.45), transparent 70%);
  top: 50%; height: 35%; animation-duration: 14s; animation-direction: reverse; filter: blur(2px);
}
.ocean-wave.w3 {
  background-image:
    radial-gradient(ellipse 1000px 120px at 50% 50%, rgba(255,143,182,0.7), transparent 60%),
    radial-gradient(ellipse 600px 90px at 30% 50%, rgba(255,62,127,0.55), transparent 65%);
  top: 60%; height: 40%; animation-duration: 11s; filter: blur(3px);
}
.ocean-wave.w4 {
  background-image:
    linear-gradient(90deg, transparent 0%, rgba(255,217,228,0.3) 25%, transparent 50%, rgba(255,143,182,0.4) 75%, transparent 100%);
  top: 72%; height: 28%; animation-duration: 8s; animation-direction: reverse; filter: blur(1px); opacity: 0.9;
}
@keyframes oceanFlow {
  0% { transform: translateX(0); }
  100% { transform: translateX(-1200px); }
}
@keyframes shimmerY {
  0% { transform: translateY(0); opacity: 0.5; }
  50% { opacity: 0.9; }
  100% { transform: translateY(40px); opacity: 0.5; }
}
</style>
</head>
<body class="cine-bars">

<!-- Preload curtain -->
<div id="preload">
  <div class="pl-mark"></div>
  <div class="pl-text" data-content="preload">Your birthday awaits…</div>
</div>
<script>
  // Runs immediately, independent of all other scripts
  (function() {
    var p = document.getElementById('preload');
    function hide() { if (p) p.classList.add('gone'); }
    setTimeout(hide, 1800);
    var vs = document.querySelectorAll('.bg-video');
    var need = Math.min(vs.length, 2), count = 0;
    function tick() { if (++count >= need) hide(); }
    for (var i = 0; i < need; i++) {
      vs[i].addEventListener('canplay', tick, { once: true });
      vs[i].addEventListener('error', tick, { once: true });
    }
  })();
</script>

<!-- Brand + audio chrome -->
<div class="brand">Hearts <span class="amp">&amp;</span> Lilies</div>
